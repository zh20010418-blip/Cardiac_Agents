name: cardiac_agent

channels:
  - pytorch          # torch、faiss-cpu 官方 channel
  - nvidia           # CUDA runtime 库
  - conda-forge      # 其他依赖的补充
  - defaults

dependencies:
  # ── Python ────────────────────────────────────────────────────────────────
  # 3.10：faiss-cpu 1.7.4 有 cp310 wheel；sentence-transformers 推荐 3.10+
  - python=3.10.14

  # ── PyTorch（CUDA 12.1）────────────────────────────────────────────────
  # 2.2.2 是 faiss conda channel 官方测试过的稳定组合
  # 如果你的显卡驱动只支持 CUDA 11.8，把 pytorch-cuda 改成 11.8
  - pytorch==2.2.2
  - torchvision==0.17.2
  - torchaudio==2.2.2
  - pytorch-cuda=12.1

  # ── faiss（用 conda 装，比 pip 稳定）──────────────────────────────────
  # conda pytorch channel 的 faiss-cpu，与上面 torch 版本已联调
  - faiss-cpu==1.7.4

  # ── 基础科学计算 ──────────────────────────────────────────────────────
  - numpy>=1.24.0,<2.0        # faiss 1.7.4 对 numpy 2.x 兼容性未验证
  - pip

  # ── pip 安装的包（conda 没有或版本更全）──────────────────────────────
  - pip:
    # transformers 4.40.2：稳定版，支持 Qwen2.5 / LLaMA3 chat template
    - transformers==4.40.2

    # sentence-transformers 2.7.0：要求 transformers>=4.34，已满足
    - sentence-transformers==2.7.0

    # transformers 依赖
    - accelerate==0.30.1       # 多卡 device_map="auto" 必须
    - tokenizers>=0.19,<0.20   # 与 transformers 4.40 锁定

    # 模型量化（INT4 推理用）
    - bitsandbytes==0.43.1     # Linux/CUDA 环境，Windows 需要用 bitsandbytes-windows

    # 其他依赖
    - safetensors>=0.4.3       # 模型权重加载
    - huggingface-hub>=0.23.0  # 模型下载
    - tqdm>=4.66.0
    - packaging>=23.0
    - regex>=2023.10.3
    - requests>=2.31.0
    - filelock>=3.13.0
    - pyyaml>=6.0.1
